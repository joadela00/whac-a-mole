
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>덩이 잡기</title>
  <!-- Preload assets to reduce first-hit lag -->
  <link rel="preload" as="image" href="assets/bg_meadow.png">
  <link rel="preload" as="image" href="assets/hole.png">
  <link rel="preload" as="image" href="assets/time.png">
  <link rel="preload" as="image" href="assets/scor.png">
  <link rel="preload" as="image" href="assets/start_button.png">
  <link rel="preload" as="image" href="assets/pa.png">
  <link rel="preload" as="image" href="assets/re.png">
  <link rel="preload" as="image" href="assets/rr.png">
  <link rel="preload" as="image" href="assets/rrx.png">
  <link rel="preload" as="image" href="assets/char_idle.png">
  <link rel="preload" as="image" href="assets/char_time.png">
  <link rel="preload" as="image" href="assets/char_th.png">
  <link rel="preload" as="image" href="assets/char_y.png">
  <link rel="preload" as="image" href="assets/char_thx.png">
  <link rel="preload" as="image" href="assets/char_yx.png">
  <link rel="preload" as="image" href="assets/effect_fire.png">
  <link rel="preload" as="image" href="assets/effect_fire2.png">
  <link rel="preload" as="image" href="assets/effect_fire3.png">
  <link rel="preload" as="image" href="assets/score_plus.png">
  <link rel="preload" as="image" href="assets/score_plus2.png">
  <link rel="preload" as="image" href="assets/score_plus5.png">
  <link rel="preload" as="image" href="assets/score_minus5.png">
  <link rel="preload" as="image" href="assets/fi_scor.png">
  <link rel="preload" as="image" href="assets/over.png">
  <style>
    /* iOS 감지용 */
    :root {
      --ios: 0;
    }
    @supports (-webkit-touch-callout: none) {
      :root { --ios: 1; }
    }
    :root {
      --bg: #9ddf3a;
      --panel: #8b4d1f;
      --panel-dark: #5d2e11;
      --panel-light: #c77a32;
      --text: #ffe45a;
      --white: #fff8df;
      --cell-size: clamp(88px, 26vw, 118px);
      --gap: clamp(6px, 2vw, 10px);
      --board-size: calc(var(--cell-size) * 3);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Pretendard', 'Noto Sans KR', 'Segoe UI', sans-serif;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: manipulation;
      color: #3b240f;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app {
      width: min(100vw, 480px);
      height: 100dvh;
      min-height: 100vh; /* fallback for mobile browsers */
      max-height: 100dvh;
      position: relative;
      overflow: visible;
      padding:
        max(10px, env(safe-area-inset-top))
        max(10px, env(safe-area-inset-right))
        max(12px, env(safe-area-inset-bottom))
        max(10px, env(safe-area-inset-left));
      background-color: #9ddf3a;
      background-image: url('assets/bg_meadow.png');
      background-position: center center;
      background-size: cover;
      background-repeat: no-repeat;
    }

    body.miss-flash .app {
      animation: missFlash 220ms ease-out;
    }

    @keyframes missFlash {
      0% { filter: brightness(1) saturate(1); }
      25% { filter: brightness(0.9) saturate(1.2); }
      100% { filter: brightness(1) saturate(1); }
    }

    .screen {
      position: absolute;
      inset: 0;
      display: none;
      overflow: visible;
    }

    .screen.active {
      display: flex;
    }

    /* Blur active screen during countdown (restart only) */
    .app.counting .screen.active {
      filter: blur(2px);
      pointer-events: none;
    }

    .start-screen,
    .gameover-screen {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 30px;
      padding: 24px;
      text-align: center;
    }

    /* HUD: lower icons and texts together */
    .hud-timeicon img {
      transform: translateY(4px);
    }
    .hud-timeicon strong {ㄱ
      transform: translate(-50%, -50%) translateY(4px) !important;
    }
    .hud-score {
      transform: translateY(12px) !important;
    }
    .hud-score strong {
      transform: translateY(8px);
    }

    .title-board,
    .result-board,
    .hud-box {
      border: 4px solid var(--panel-dark);
      background: linear-gradient(var(--panel-light), var(--panel));
      border-radius: 18px;
      box-shadow: inset 0 -6px 0 rgba(0,0,0,0.18);
      color: var(--text);
      font-weight: 900;
      text-shadow: 2px 2px 0 #7b3300;
    }

    .title-board {
      padding: 14px 22px;
      font-size: clamp(24px, 7vw, 40px);
    }

    .title-board.title-image {
      padding: 0;
      width: 360px;
      height: 220px;
      background: url('assets/title.png') center/contain no-repeat;
      border: none;
      box-shadow: none;
      text-indent: -9999px;
      animation: floatTitle 1.6s ease-in-out infinite alternate;
    }

    @keyframes floatTitle {
      0%   { transform: translateY(0); }
      45%  { transform: translateY(-16px); }
      100% { transform: translateY(2px); }
    }

    .hero-hole {
      width: 180px;
      height: 150px;
      position: relative;
    }

    .hero-hole .hole,
    .hero-hole .mole {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .hero-hole .hole {
      bottom: 0;
      width: 150px;
      height: 72px;
    }

    .hero-hole .mole {
      bottom: -28px;
      width: 108px;
      height: 108px;
      animation: bob 1.1s ease-in-out infinite alternate;
      opacity: 1;
    }

    .start-screen .hero-hole .mole {
      animation: bob 1.1s ease-in-out infinite alternate, startMoleLoop 8s ease-in-out infinite;
      opacity: 1;
      animation-delay: 0s, 0s;
    }

    .gameover-screen .hero-hole .mole {
      opacity: 1;
    }

    @keyframes bob {
      from { transform: translateX(-50%) translateY(0); }
      to { transform: translateX(-50%) translateY(-6px); }
    }

    @keyframes startMoleLoop {
      0%   { opacity: 0; }
      10%  { opacity: 1; }
      60%  { opacity: 1; }
      70%  { opacity: 0; }
      100% { opacity: 0; }
    }

    @keyframes floatIdle {
      0%    { transform: translateX(-50%) translateY(10px);  opacity: 0; }
      12%   { transform: translateX(-50%) translateY(2px);   opacity: 0.45; }
      30%   { transform: translateX(-50%) translateY(-9px);  opacity: 1; }
      48%   { transform: translateX(-50%) translateY(-5px);  opacity: 1; }
      65%   { transform: translateX(-50%) translateY(-1px);  opacity: 0.75; }
      78%   { transform: translateX(-50%) translateY(4px);   opacity: 0.35; }
      88%   { transform: translateX(-50%) translateY(9px);   opacity: 0; }
      100%  { transform: translateX(-50%) translateY(9px);   opacity: 0; } /* 쉬는 구간 */
    }

    .pixel-btn {
      width: min(280px, 64vw);
      height: 86px;
      min-height: 60px;
      padding: 0;
      border: 0;
      background: transparent url('assets/start_button.png') center/contain no-repeat;
      cursor: pointer;
      display: block;
      transition: transform 60ms ease, filter 60ms ease;
      box-shadow: none;
      outline: none;
    }

    .pixel-btn:active {
      transform: translateY(8px) scale(0.9);
      filter: brightness(0.88);
      box-shadow: 0 2px 0 rgba(0,0,0,0.25);
    }

    .game-screen {
      flex-direction: column;
      align-items: center;
      padding: 14px 10px 18px;

      /* new spacing */
      gap: clamp(18px, 4vh, 26px);
      overflow: visible;
    }

    .hud {
      width: min(94%, 430px);
      display: flex;
      gap: 0;
      align-items: stretch;
      justify-content: space-between;
      margin-bottom: 10px;
      transform: translateY(10px); /* 상단 HUD를 살짝 아래로 */
    }

    .hud-box {
      position: relative;
      padding: 6px 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 94px;
      min-height: 94px;
      background: transparent;
      border: none;
      color: #5d2e11;
      box-shadow: none;
      line-height: 1;
      flex: 1;
      min-width: 0;
    }

    .hud-timeicon img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      image-rendering: auto;
    }

    .hud-timeicon strong {
      position: absolute;
      left: 50%;
      top: 64%;
      transform: translate(-50%, -50%) !important;
      display: inline-block;
      margin: 0;
      color: #82e7ff !important;
      text-shadow:
        1px 1px 0 #0f5d78,
        0 2px 10px rgba(0,160,255,0.35) !important;
      font-size: 20px !important;
      background: none !important;
      border: none !important;
      pointer-events: none;
    }

    .hud-timeicon {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hud-box strong {
      display: inline-block;
      padding: 6px 12px;
      min-width: 58px;
      text-align: center;
      transform: translateX(0);
      font-size: 21px;
      background: none;
      border: none;
      color: #ffd500;
      text-shadow:
        1.5px 1.5px 0 #744800,
        0 2px 10px rgba(0,0,0,0.25);
      letter-spacing: 0.5px;
    }

    .hud-score {
      flex: 1;
      justify-content: center;
      font-size: 18px;
      margin-left: 0;
      background: url('assets/scor.png') center/contain no-repeat;
      background-size: contain;
      transform: translateY(8px);  /* 양수면 아래로 내려감 */
      background-repeat: no-repeat;
      min-width: 0;
      padding: 0 10px;
    }

    /* Enlarge in-game score digits slightly */
    .hud-score strong {
      font-size: 23px !important; /* 게임 중 스코어 점수부분 크기 */
    }

    .clock {
      font-size: 24px;
      color: #82e7ff;
      filter: drop-shadow(1px 1px 0 #0f5d78) drop-shadow(0 0 8px rgba(0,160,255,0.35));
    }

    .progressWrap {
      position: relative;
      width: min(94%, 430px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .progressTrack {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(#2b1d0c, #1f1408);
      border: 3px solid #5a3a14;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.25), 0 2px 0 rgba(0,0,0,0.25);
      overflow: hidden;
    }

    .time-readout {
      font-size: 22px;
      font-weight: 900;
      color: #82e7ff;
      text-shadow:
        1.2px 1.2px 0 #0f5d78,
        0 2px 10px rgba(0,160,255,0.35);
    }

    .progressFill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #6fd94d 0%, #f6c63b 65%, #ff8a3c 100%);
      opacity: 0.9;
      transition: width 160ms linear, filter 160ms linear;
    }

    .board {
      width: var(--board-size);
      height: var(--board-size);

      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--gap);

      user-select: none;
      margin-top: clamp(60px, 12vh, 140px);

      padding: 10px;
      border-radius: 18px;

      overflow: visible; /* allow effects to spill outside */
      position: relative;
      z-index: 1;
    }

    .cell {
      width: var(--cell-size);
      height: var(--cell-size);
      position: relative;
      overflow: visible;
      background: transparent;
      border: 0;
      padding: 0;
      z-index: 2;
      contain: layout;
      will-change: transform;
    }

    .cell-variant-1 { background-position: 20% 30%; filter: brightness(0.97) saturate(1.05); }
    .cell-variant-2 { background-position: -15% -10%; filter: brightness(1.05) saturate(0.95); }

    .hole {
      width: 100%;
      height: 60%;
      position: absolute;
      left: 0;
      bottom: 6%;
      display: grid;
      place-items: center;
      z-index: 5;
      pointer-events: none;
    }

    .hole img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      image-rendering: pixelated;
      transform: translateZ(0);
    }

    .mole {
      width: 82%;
      aspect-ratio: 1 / 1;
      position: absolute;
      left: 50%;
      bottom: -8%;
      transform: translateX(-50%) translateY(80%);
      opacity: 0;
      pointer-events: none;
      z-index: 7;
      display: grid;
      place-items: center;
    }

    .mole img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      transform: translateY(20%);
    }

    .cell.up .mole {
      opacity: 1;
      animation: molePop 220ms cubic-bezier(0.25, 0.8, 0.35, 1) forwards;
      pointer-events: auto;
    }

    .fx-pop,
    .fx-score {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      opacity: 0;
      display: grid;
      place-items: center;
      z-index: 90;
      will-change: transform, opacity;
      overflow: visible;
    }

    .fx-pop {
      bottom: 0%;
      width: 120%;
      aspect-ratio: 1 / 1;
      overflow: visible;
    }

    .fx-pop img,
    .fx-score img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .fx-pop.show {
      opacity: 1;
      animation: popFx 520ms ease-out forwards;
    }

@keyframes popFx {
      0%   { transform: translateX(-50%) scale(.6); opacity: 0; }
      35%  { transform: translateX(-50%) scale(1.05); opacity: 1; }
      70%  { transform: translateX(-50%) scale(1.2); opacity: .9; }
      100% { transform: translateX(-50%) scale(1.3); opacity: 0; }
    }

    @keyframes molePop {
      0%   { transform: translateX(-50%) translateY(80%) scale(0.92); opacity: 0; }
      60%  { transform: translateX(-50%) translateY(6%)  scale(1.0);  opacity: 1; }
      100% { transform: translateX(-50%) translateY(0%)  scale(1);    opacity: 1; }
    }

    .fx-score {
      bottom: 38%;
      width: 82%;
      aspect-ratio: 1.2 / 1;
      overflow: visible;
    }

    .fx-score.show {
      animation: scoreFx 520ms ease-out forwards;
    }

@keyframes scoreFx {
      from { transform: translateX(-50%) translateY(12px) scale(0.95); opacity: 0; }
      25%  { opacity: 1; transform: translateX(-50%) translateY(0) scale(1.08); }
      to   { transform: translateX(-50%) translateY(-22px) scale(1.1); opacity: 0; }
    }

    .countdown {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);

      display: flex;
      align-items: center;
      justify-content: center;

      font-size: 96px;
      font-weight: 900;
      color: #82e7ff;

      text-shadow:
        2px 2px 0 #0f5d78;

      pointer-events: none;
      z-index: 999;

      width: 100%;
      height: 100%;
    }

    .app.paused * {
      animation-play-state: paused !important;
      transition-duration: 0s !important;
    }

    .bottom-controls {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 16px;
      pointer-events: none;
      z-index: 50;
    }

    .circle-btn {
      width: 86px;
      height: 86px;
      min-width: 64px;
      min-height: 64px;
      padding: 0;
      border: 0;
      background: transparent center/contain no-repeat;
      cursor: pointer;
      pointer-events: auto;
      transition: transform 60ms ease, filter 60ms ease;
      box-shadow: none;
      outline: none;
    }

    .pressed {
      transform: translateY(3px) scale(0.96) !important;
      filter: brightness(0.94) !important;
      box-shadow: none !important;
    }

    .released {
      animation: btnRebound 160ms ease-out;
    }

    @keyframes btnRebound {
      0%   { transform: translateY(3px) scale(0.96); box-shadow: none; }
      60%  { transform: translateY(-2px) scale(1.02); box-shadow: none; }
      100% { transform: translateY(0) scale(1); box-shadow: none; }
    }

    .pause-btn { background-image: url('assets/pa.png'); }
    .restart-small { background-image: url('assets/re.png'); }
    .vibe-btn { background-image: url('assets/rrx.png'); display: block; }
    @supports (-webkit-touch-callout: none) {
      /* Hide vibration toggle on iOS */
      .vibe-btn { display: none !important; }
    }

    .fx-score .bonus-label {
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      font-weight: 900;
      color: #ffe46b;
      padding: 0;
      border-radius: 0;
      background: none;
      border: none;
      box-shadow: none;
      text-shadow:
        1.5px 1.5px 0 #7b3300,
        0 0 8px rgba(0,0,0,0.25);
      pointer-events: none;
    }

    .fx-score .bonus-label.bonus-timer {
      font-size: 32px;
      color: #82e7ff;
      text-shadow:
        1.5px 1.5px 0 #0f5d78,
        0 0 10px rgba(0, 160, 255, 0.45);
      background: none;
      border: none;
    }

    .gameover-screen {
      background: rgba(0,0,0,.08);
      backdrop-filter: blur(2px);
    }

    .gameover-screen .hero-hole {
      transform: translateY(-60px);
      visibility: hidden;
    }

    .result-title {
      padding: 14px 26px;
      font-size: clamp(28px, 8vw, 42px);
    }

    .result-title.over-title {
      padding: 0;
      width: 280px;
      height: 160px;
      background: url('assets/over.png') center/contain no-repeat;
      border: none;
      box-shadow: none;
      text-indent: -9999px;
    }

    .result-board {
      padding: 0;
      min-width: 240px;
      font-size: 26px;
      background: url('assets/fi_scor.png') center/contain no-repeat;
      border: none;
      box-shadow: none;
      text-indent: -9999px;
      position: relative;
      height: 140px;
      display: grid;
      place-items: center;
    }

    .result-board strong {
      display: block;
      font-size: 48px;
      margin-top: 6px;  /* 숫자를 올리면 아래로 */
      text-indent: 0;
      color: #ffe56f;
      text-shadow:
        1.5px 1.5px 0 #7b3300,
        0 2px 10px rgba(0,0,0,0.25);
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="app">
    <div id="countdown" class="countdown hidden">3</div>
    <section class="screen start-screen active" id="startScreen">
      <div class="title-board title-image">두더지 잡기!</div>
      <div class="hero-hole" style="margin-bottom: 50px;">
        <div class="hole"><img src="assets/hole.png" alt=""></div>
        <div class="mole"><img src="assets/char_idle.png" alt=""></div>
      </div>
      <button class="pixel-btn" id="startBtn" type="button" aria-label="START" style="margin-top: -20px;"></button>
    </section>

    <section class="screen game-screen" id="gameScreen">
      <div class="hud">
        <div class="hud-box hud-timeicon">
          <img src="assets/time.png" alt="time icon">
          <strong id="timeValue">30초</strong>
        </div>
        <div class="hud-box hud-score"><strong id="scoreValue">0</strong></div>
      </div>
      <div class="board" id="board"></div>
      <div class="bottom-controls">
        <button class="circle-btn pause-btn" type="button" aria-label="Pause"></button>
        <button class="circle-btn vibe-btn" type="button" aria-label="Vibrate"></button>
        <button class="circle-btn restart-small" type="button" aria-label="Restart"></button>
      </div>
    </section>

    <section class="screen gameover-screen" id="gameOverScreen">
      <div class="result-title title-board over-title">GAME OVER</div>
      <div class="result-board"><strong id="finalScore">0</strong></div>
      <button class="pixel-btn" id="restartBtn" type="button" aria-label="RESTART" style="margin-top: 18px;"></button>
    </section>
  </div>


<script>
const isiOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
const appEl = document.querySelector('.app');
const startScreen = document.getElementById('startScreen');
const gameScreen = document.getElementById('gameScreen');
const gameOverScreen = document.getElementById('gameOverScreen');
const startBtn = document.getElementById('startBtn');
const restartBtn = document.getElementById('restartBtn');
const pauseBtn = document.querySelector('.pause-btn');
const vibeBtn = document.querySelector('.vibe-btn');
const restartSmallBtn = document.querySelector('.restart-small');
const board = document.getElementById('board');
const scoreValue = document.getElementById('scoreValue');
const timeValue = document.getElementById('timeValue');
const finalScore = document.getElementById('finalScore');
const countdownEl = document.getElementById('countdown');

if (vibeBtn && isiOS) vibeBtn.style.display = 'none';

const GAME_TIME = 30;
const HOLE_COUNT = 9;
const MAX_ACTIVE = 3;

const ASSETS = {
  hole: 'assets/hole.png',
  idle: 'assets/char_idle.png',
};

let score = 0;
let timeLeft = GAME_TIME;
let running = false;
let paused = false;
let countingDown = false;

let allowCountdownCancel = false;
let countdownCancelArmed = false;
let countdownTimer = null;

let timerInterval = null;
const cells = [];
const holeActive = Array(HOLE_COUNT).fill(false);
const holeTimers = Array.from({ length: HOLE_COUNT }, () => ({ spawnTimer: null, hideTimer: null }));

function createBoard() {
  board.innerHTML = '';
  cells.length = 0;

  for (let i = 0; i < HOLE_COUNT; i++) {
    const cell = document.createElement('button');
    cell.className = 'cell';
    cell.innerHTML = `
      <div class="hole"><img src="${ASSETS.hole}"></div>
      <div class="mole"><img src="${ASSETS.idle}"></div>
    `;
    cell.addEventListener('pointerdown', () => hitMole(i));
    board.appendChild(cell);
    cells.push(cell);
  }
}

function setScreen(s) {
  [startScreen, gameScreen, gameOverScreen].forEach(el => el.classList.remove('active'));
  s.classList.add('active');
}

function resetGame() {
  score = 0;
  timeLeft = GAME_TIME;
  scoreValue.textContent = score;
  timeValue.textContent = `${timeLeft}초`;

  holeActive.fill(false);

  holeTimers.forEach(t => {
    clearTimeout(t.spawnTimer);
    clearTimeout(t.hideTimer);
  });

  cells.forEach(cell => cell.classList.remove('up'));
}

function spawnMole(i) {
  if (!running || paused) return;

  const cell = cells[i];
  if (cell.classList.contains('up')) return;

  cell.classList.add('up');
  holeActive[i] = true;

  holeTimers[i].hideTimer = setTimeout(() => {
    hideMole(i);
    scheduleSpawn(i);
  }, 800 + Math.random() * 500);
}

function hideMole(i) {
  const cell = cells[i];
  cell.classList.remove('up');
  holeActive[i] = false;
}

function scheduleSpawn(i, delay = 800 + Math.random() * 600) {
  holeTimers[i].spawnTimer = setTimeout(() => spawnMole(i), delay);
}

function startGame() {
  resetGame();
  running = true;
  paused = false;

  setScreen(gameScreen);

  for (let i = 0; i < HOLE_COUNT; i++) {
    scheduleSpawn(i, i * 120);
  }

  timerInterval = setInterval(() => {
    if (paused) return;

    timeLeft--;
    timeValue.textContent = `${timeLeft}초`;

    if (timeLeft <= 0) endGame();
  }, 1000);
}

function endGame() {
  running = false;
  clearInterval(timerInterval);

  holeTimers.forEach(t => {
    clearTimeout(t.spawnTimer);
    clearTimeout(t.hideTimer);
  });

  finalScore.textContent = score;
  setScreen(gameOverScreen);
}

function hitMole(i) {
  if (countingDown || !running || paused) return;
  if (!holeActive[i]) return;

  score++;
  scoreValue.textContent = score;

  hideMole(i);
}

function startCountdown(callback, blur = false, cancelable = false) {
  if (countingDown) return;

  countingDown = true;
  allowCountdownCancel = cancelable;
  countdownCancelArmed = false;

  setTimeout(() => countdownCancelArmed = true, 60);

  let n = 3;
  countdownEl.classList.remove('hidden');
  countdownEl.textContent = n;

  countdownTimer = setInterval(() => {
    n--;

    if (n > 0) countdownEl.textContent = n;
    else if (n === 0) countdownEl.textContent = 'GO!';
    else {
      clearInterval(countdownTimer);
      countdownEl.classList.add('hidden');
      countingDown = false;
      callback();
    }
  }, 600);
}

function cancelCountdown() {
  if (!countingDown || !allowCountdownCancel || !countdownCancelArmed) return;

  clearInterval(countdownTimer);
  countdownEl.classList.add('hidden');

  countingDown = false;
  allowCountdownCancel = false;
  countdownCancelArmed = false;

  running = false;
  paused = false;
}

// ⭐ 핵심 FIX (버튼 안막고 배경만 취소)
appEl.addEventListener('pointerdown', (e) => {
  if (!countingDown) return;

  const isButton = e.target.closest('button');
  if (isButton) return;

  cancelCountdown();
});

startBtn.addEventListener('pointerdown', () => {
  if (countingDown) return;
  startCountdown(startGame);
});

restartBtn.addEventListener('pointerdown', () => {
  if (countingDown) return;
  startCountdown(startGame, true, true);
});

restartSmallBtn.addEventListener('pointerdown', () => {
  if (countingDown) return;
  if (running) endGame();
  startCountdown(startGame, true, true);
});

pauseBtn.addEventListener('pointerdown', () => {
  if (countingDown) return;
  if (!running) return;

  paused = !paused;
});

createBoard();
</script>
